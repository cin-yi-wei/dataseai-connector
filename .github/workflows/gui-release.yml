name: gui-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            goos: windows
            goarch: amd64
          - os: macos-13
            platform: darwin/amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            platform: darwin/arm64
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            platform: linux/amd64
            goos: linux
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cmd/connector-gui/frontend/package-lock.json

      - name: Install Linux webkit deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build connector CLI
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          mkdir -p staging
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o staging/dataseai-connector${EXT} \
            ./cmd/connector

      - name: Build GUI
        working-directory: cmd/connector-gui
        run: wails build -platform ${{ matrix.platform }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VER = "${{ github.ref_name }}" -replace '^v', ''
          $NAME = "dataseai-connector-gui_${VER}_windows_amd64"
          New-Item -ItemType Directory $NAME
          Copy-Item cmd/connector-gui/build/bin/dataseai-connector-gui.exe "$NAME/"
          Copy-Item staging/dataseai-connector.exe "$NAME/"
          Copy-Item cmd/connector-gui/README.md "$NAME/"
          Compress-Archive -Path $NAME -DestinationPath "${NAME}.zip"
          "ASSET=${NAME}.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NAME="dataseai-connector-gui_${VER}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$NAME"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            cp -r cmd/connector-gui/build/bin/dataseai-connector-gui.app "$NAME/"
          else
            cp cmd/connector-gui/build/bin/dataseai-connector-gui "$NAME/"
          fi
          cp staging/dataseai-connector "$NAME/"
          cp cmd/connector-gui/README.md "$NAME/"
          tar czf "${NAME}.tar.gz" "$NAME"
          echo "ASSET=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
