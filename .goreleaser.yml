version: 2

project_name: dataseai-connector

before:
  hooks:
    - go mod tidy

builds:
  - id: connector
    binary: dataseai-connector
    main: ./cmd/connector
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: test-broker
    binary: dataseai-test-broker
    main: ./cmd/test-broker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: connector
    ids: [connector]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*

  - id: test-broker
    ids: [test-broker]
    name_template: "{{ .ProjectName }}-test-broker_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*

nfpms:
  - id: linux-packages
    ids: [connector]
    package_name: dataseai-connector
    vendor: dataseai
    homepage: https://dataseai.app
    maintainer: cin-yi-wei
    description: dataseai LAN connector agent
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: cin-yi-wei
    name: dataseai-connector
  draft: false
  prerelease: auto       # treat -rc / -beta tags as pre-release
  name_template: "v{{ .Version }}"
  replace_existing_artifacts: true
